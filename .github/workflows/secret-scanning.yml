name: Secret Scanning

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    # GitHub occasionally delivers a push whose before and after SHA are
    # identical. TruffleHog intentionally rejects that empty range; a zero
    # before SHA is a new ref and must still be scanned.
    if: ${{ github.event_name != 'push' || github.event.before != github.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD 